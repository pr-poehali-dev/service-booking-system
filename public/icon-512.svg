    <ellipse cx="0" cy="-52" rx="28" ry="42" fill="#f2a0b5" transform="rotate(216)"/>
    <ellipse cx="0" cy="-52" rx="28" ry="42" fill="#f2a0b5" transform="rotate(288)"/>
    <!-- Лепестки средние -->
    <ellipse cx="0" cy="-80" rx="32" ry="52" fill="#e8809a" transform="rotate(36)"/>
    <ellipse cx="0" cy="-80" rx="32" ry="52" fill="#e8809a" transform="rotate(108)"/>
    <ellipse cx="0" cy="-80" rx="32" ry="52" fill="#e8809a" transform="rotate(180)"/>
