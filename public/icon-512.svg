  <g transform="translate(256,256)">
    <!-- Центр -->
    <circle cx="0" cy="0" r="38" fill="#f7c5d0"/>
    <!-- Лепестки внутренние -->
    <ellipse cx="0" cy="-52" rx="28" ry="42" fill="#f2a0b5" transform="rotate(0)"/>
    <ellipse cx="0" cy="-52" rx="28" ry="42" fill="#f2a0b5" transform="rotate(72)"/>
