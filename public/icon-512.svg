    <ellipse cx="0" cy="-108" rx="34" ry="58" fill="#d9607a" opacity="0.7" transform="rotate(90)"/>
    <ellipse cx="0" cy="-108" rx="34" ry="58" fill="#d9607a" opacity="0.7" transform="rotate(162)"/>
    <ellipse cx="0" cy="-108" rx="34" ry="58" fill="#d9607a" opacity="0.7" transform="rotate(234)"/>
    <ellipse cx="0" cy="-108" rx="34" ry="58" fill="#d9607a" opacity="0.7" transform="rotate(306)"/>
